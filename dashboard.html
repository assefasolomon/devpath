<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | DevPath</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body{background:var(--bg)}
    .wrap{max-width:960px;margin:0 auto;padding:2.5rem 2rem}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:1rem}
    .user-info-name{font-size:1.3rem;font-weight:700;color:var(--heading)}
    .user-info-email{font-size:.85rem;color:var(--text-muted);margin-top:2px}
    .logout-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:.4rem 1rem;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-ui);font-size:.85rem;transition:all var(--transition)}
    .logout-btn:hover{border-color:#ef4444;color:#ef4444}
    /* Status card */
    .status-card{border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
    .status-card.verified{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.3)}
    .status-card.pending{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3)}
    .status-card.rejected{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3)}
    .status-card.none{background:var(--surface);border:1px solid var(--border)}
    .status-left{}
    .status-icon{font-size:1.75rem;margin-bottom:.25rem}
    .status-title{font-size:1rem;font-weight:700;color:var(--heading)}
    .status-desc{font-size:.85rem;color:var(--text-muted);margin-top:3px;line-height:1.5}
    .status-action{background:var(--primary);color:#fff;border:none;padding:.6rem 1.25rem;border-radius:var(--radius);font-size:.875rem;font-weight:700;cursor:pointer;text-decoration:none;font-family:var(--font-ui);transition:all var(--transition);display:inline-block}
    .status-action:hover{background:var(--primary-hover);color:#fff}
    /* Payment details */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem}
    .card-title{font-size:.95rem;font-weight:700;color:var(--heading);margin-bottom:1rem}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem}
    .detail-item .dl{font-family:var(--font-mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:3px}
    .detail-item .dv{font-size:.9rem;color:var(--heading);font-weight:600}
    .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.72rem;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
    .badge-verified{background:rgba(16,185,129,.15);color:#10b981}
    .badge-pending{background:rgba(251,191,36,.15);color:#fbbf24}
    .badge-rejected{background:rgba(239,68,68,.15);color:#ef4444}
    .badge-none{background:var(--surface-2);color:var(--text-muted)}
    /* Courses */
    .section-title{font-size:1rem;font-weight:700;color:var(--heading);margin-bottom:1rem}
    .courses-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1rem}
    .course-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;text-decoration:none;color:inherit;transition:all var(--transition);display:block;position:relative}
    .course-card.unlocked:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--primary)}
    .course-card.locked{opacity:.5;cursor:not-allowed}
    .course-icon{font-size:1.75rem;margin-bottom:.75rem}
    .course-title{font-size:.95rem;font-weight:700;color:var(--heading);margin-bottom:.35rem}
    .course-desc{font-size:.8rem;color:var(--text-muted);line-height:1.5;margin-bottom:.75rem}
    .course-action{font-size:.78rem;font-family:var(--font-mono);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
    .course-action.open{color:var(--green)}
    .course-action.lock{color:var(--text-muted)}
    .lock-icon{position:absolute;top:.875rem;right:.875rem;font-size:1rem;opacity:.35}
    /* Loading skeleton */
    .skeleton{background:var(--surface-2);border-radius:var(--radius);animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
    .refresh-note{font-size:.78rem;color:var(--text-muted);font-family:var(--font-mono);text-align:center;margin-top:1rem}
  </style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.8"/><path d="M8 14 L14 7 L20 14 L14 21 Z" fill="currentColor"/></svg>
    DevPath
  </a>
</nav>
<div class="wrap">
  <div class="top-bar">
    <div>
      <div class="user-info-name" id="user-name">Loading...</div>
      <div class="user-info-email" id="user-email"></div>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Payment status -->
  <div class="status-card" id="status-card">
    <div class="status-left">
      <div class="status-icon" id="status-icon">⏳</div>
      <div class="status-title" id="status-title">Loading...</div>
      <div class="status-desc"  id="status-desc"></div>
    </div>
    <div id="status-action-wrap"></div>
  </div>

  <!-- Payment details card (shown when has payment) -->
  <div class="card" id="payment-card" style="display:none">
    <div class="card-title">Payment Details</div>
    <div class="detail-grid">
      <div class="detail-item"><div class="dl">Plan</div><div class="dv" id="d-plan">—</div></div>
      <div class="detail-item"><div class="dl">Amount</div><div class="dv" id="d-amount">—</div></div>
      <div class="detail-item"><div class="dl">Reference</div><div class="dv" id="d-ref" style="font-family:var(--font-mono)">—</div></div>
      <div class="detail-item"><div class="dl">Transaction ID</div><div class="dv" id="d-tx" style="font-family:var(--font-mono)">—</div></div>
      <div class="detail-item"><div class="dl">Method</div><div class="dv" id="d-method">—</div></div>
      <div class="detail-item"><div class="dl">Status</div><div class="dv" id="d-status">—</div></div>
      <div class="detail-item"><div class="dl">Submitted</div><div class="dv" id="d-submitted">—</div></div>
      <div class="detail-item"><div class="dl">Verified</div><div class="dv" id="d-verified">—</div></div>
    </div>
    <div id="d-notes-wrap" style="display:none;margin-top:1rem">
      <div style="font-family:var(--font-mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:4px">Admin Notes</div>
      <div id="d-notes" style="font-size:.875rem;color:#ef4444;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:var(--radius-sm);padding:.75rem 1rem"></div>
    </div>
  </div>

  <!-- Courses -->
  <div class="section-title" id="courses-title">Your Courses</div>
  <div class="courses-grid" id="courses-grid">
    <div class="skeleton" style="height:180px;border-radius:var(--radius-lg)"></div>
    <div class="skeleton" style="height:180px;border-radius:var(--radius-lg)"></div>
    <div class="skeleton" style="height:180px;border-radius:var(--radius-lg)"></div>
    <div class="skeleton" style="height:180px;border-radius:var(--radius-lg)"></div>
  </div>

  <div class="refresh-note" id="refresh-note" style="display:none">
    ⟳ Status updates automatically every 30 seconds
  </div>
</div>

<script>
  const COURSES = [
    {icon:'🧱',title:'Foundations',desc:'HTML, CSS, JavaScript, Git, and the command line.',url:'/foundations/index.html'},
    {icon:'⚡',title:'Full Stack JavaScript',desc:'React, Node.js, Express, and PostgreSQL.',url:'/paths/full-stack-javascript/index.html'},
    {icon:'💎',title:'Full Stack Ruby on Rails',desc:'Ruby and Rails — production web apps.',url:'/paths/full-stack-ruby-on-rails/index.html'},
    {icon:'🐍',title:'Python for AI',desc:'Python, NumPy, Pandas, Matplotlib for AI.',url:'/paths/python-ai/index.html'},
  ];

  const methodNames = {telebirr:'Telebirr',cbe:'CBE',awash:'Awash Bank',bank_transfer:'Bank Transfer'};

  window.addEventListener('DOMContentLoaded', () => {
    loadDashboard();
  });

  async function loadDashboard() {
    try {
      const meRes  = await fetch('/api/auth/me', {credentials:'include'});
      const meData = await meRes.json();

      if (!meData.user) { location.href = '/login.html?reason=login_required'; return; }
      if (meData.user.is_admin) { location.href = '/admin.html'; return; }

      const user = meData.user;
      document.getElementById('user-name').textContent  = user.first_name + ' ' + user.last_name;
      document.getElementById('user-email').textContent = user.email;

      const payRes  = await fetch('/api/payment/status', {credentials:'include'});
      const payData = await payRes.json();

      renderStatus(payData);
      renderPaymentDetails(payData);
      renderCourses(payData.status === 'verified');

      // Show auto-refresh note for pending
      if (payData.status === 'pending') {
        document.getElementById('refresh-note').style.display = 'block';
      }

    } catch (err) {
      console.error(err);
      location.href = '/login.html';
    }
  }

  function renderStatus(pay) {
    const card       = document.getElementById('status-card');
    const icon       = document.getElementById('status-icon');
    const title      = document.getElementById('status-title');
    const desc       = document.getElementById('status-desc');
    const actionWrap = document.getElementById('status-action-wrap');

    if (pay.status === 'verified') {
      card.className   = 'status-card verified';
      icon.textContent  = '✅';
      title.textContent = 'Payment Verified — Full Access Active';
      desc.textContent  = 'You have lifetime access to all DevPath courses.';
      actionWrap.innerHTML = '';
    } else if (pay.status === 'pending' && pay.user_tx_id) {
      card.className   = 'status-card pending';
      icon.textContent  = '⏳';
      title.textContent = 'Payment Under Review';
      desc.textContent  = 'We received your transfer details and are verifying the transaction. Usually 1–2 hours.';
      actionWrap.innerHTML = '';
    } else if (pay.status === 'pending' && !pay.user_tx_id) {
      card.className   = 'status-card pending';
      icon.textContent  = '📋';
      title.textContent = 'Complete Your Payment';
      desc.textContent  = 'You have a reference code. Submit your transaction details to continue.';
      actionWrap.innerHTML = `<a href="/submit-payment.html" class="status-action">Submit Details →</a>`;
    } else if (pay.status === 'rejected') {
      card.className   = 'status-card rejected';
      icon.textContent  = '❌';
      title.textContent = 'Payment Not Verified';
      desc.textContent  = pay.notes || 'Your payment could not be verified. Please try again.';
      actionWrap.innerHTML = `<a href="/pay.html" class="status-action">Try Again →</a>`;
    } else {
      card.className   = 'status-card none';
      icon.textContent  = '💳';
      title.textContent = 'No Payment Found';
      desc.textContent  = 'Complete your payment to unlock all 4 learning paths.';
      actionWrap.innerHTML = `<a href="/pay.html" class="status-action">Pay Now — 599 ETB</a>`;
    }
  }

  function renderPaymentDetails(pay) {
    if (pay.status === 'none') return;
    document.getElementById('payment-card').style.display = 'block';
    document.getElementById('d-plan').textContent      = 'DevPath Full Access';
    document.getElementById('d-amount').textContent    = pay.amount + ' ' + (pay.currency || 'ETB');
    document.getElementById('d-ref').textContent       = pay.reference_code || '—';
    document.getElementById('d-tx').textContent        = pay.user_tx_id || 'Not submitted yet';
    document.getElementById('d-method').textContent    = pay.payment_method ? (methodNames[pay.payment_method] || pay.payment_method) : '—';
    document.getElementById('d-submitted').textContent = pay.submitted_at
      ? new Date(pay.submitted_at).toLocaleString('en-GB') : '—';
    document.getElementById('d-verified').textContent  = pay.verified_at
      ? new Date(pay.verified_at).toLocaleString('en-GB') : '—';

    const badges = {
      verified: '<span class="badge badge-verified">✓ Verified</span>',
      pending:  '<span class="badge badge-pending">⏳ Pending</span>',
      rejected: '<span class="badge badge-rejected">✗ Rejected</span>',
    };
    document.getElementById('d-status').innerHTML = badges[pay.status] || pay.status;

    if (pay.notes && pay.status === 'rejected') {
      document.getElementById('d-notes-wrap').style.display = 'block';
      document.getElementById('d-notes').textContent = pay.notes;
    }
  }

  function renderCourses(unlocked) {
    const grid  = document.getElementById('courses-grid');
    const title = document.getElementById('courses-title');
    title.textContent = unlocked ? '✅ Your Courses — All Unlocked' : '🔒 Courses — Locked Until Payment';

    grid.innerHTML = COURSES.map(c => {
      if (unlocked) {
        return `
          <a href="${c.url}" class="course-card unlocked">
            <div class="course-icon">${c.icon}</div>
            <div class="course-title">${c.title}</div>
            <div class="course-desc">${c.desc}</div>
            <div class="course-action open">▶ Start learning</div>
          </a>`;
      }
      return `
        <div class="course-card locked">
          <span class="lock-icon">🔒</span>
          <div class="course-icon">${c.icon}</div>
          <div class="course-title">${c.title}</div>
          <div class="course-desc">${c.desc}</div>
          <div class="course-action lock">Locked — pay to unlock</div>
        </div>`;
    }).join('');
  }

  // Auto-refresh every 30 seconds to detect admin verification
  let refreshCount = 0;
  const refreshInterval = setInterval(async () => {
    refreshCount++;
    try {
      const payRes  = await fetch('/api/payment/status', {credentials:'include'});
      const payData = await payRes.json();
      renderStatus(payData);
      renderPaymentDetails(payData);
      renderCourses(payData.status === 'verified');

      if (payData.status === 'verified') {
        clearInterval(refreshInterval);
        document.getElementById('refresh-note').style.display = 'none';
        // Show instant access message
        const note = document.createElement('div');
        note.style.cssText = 'background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:8px;padding:12px 16px;text-align:center;color:#10b981;font-weight:700;margin-top:1rem';
        note.textContent = '🎉 Your payment was just verified! Courses are now unlocked.';
        document.querySelector('.wrap').appendChild(note);
      }

      if (refreshCount > 60) clearInterval(refreshInterval); // stop after 30 min
    } catch (e) {}
  }, 30000);

  async function logout() {
    await fetch('/api/auth/logout', {method:'POST', credentials:'include'});
    location.href = '/login.html';
  }
</script>
</body>
</html>
