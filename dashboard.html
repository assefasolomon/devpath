<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard | Freelance Skills Hub</title>
  <link rel="stylesheet" href="css/brand.css">
  <style>
    .wrap{max-width:1000px;margin:0 auto;padding:2.5rem 2rem}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
    .top-bar-left h1{font-size:1.4rem;font-weight:800;color:var(--heading)}
    .top-bar-left p{font-size:.875rem;color:var(--text-muted);margin-top:2px}
    /* Status card */
    .status-card{border-radius:var(--radius-xl);padding:1.5rem;margin-bottom:1.75rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
    .status-card.verified{background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:1.5px solid #86EFAC}
    .status-card.pending{background:linear-gradient(135deg,#FFFBEB,#FEF9C3);border:1.5px solid #FDE68A}
    .status-card.rejected{background:linear-gradient(135deg,#FEF2F2,#FEE2E2);border:1.5px solid #FECACA}
    .status-card.none{background:#fff;border:1px solid var(--border)}
    .status-icon{font-size:2.25rem;margin-bottom:.25rem}
    .status-title{font-size:1.05rem;font-weight:800;color:var(--heading)}
    .status-desc{font-size:.875rem;color:var(--text-muted);margin-top:3px;line-height:1.5;max-width:500px}
    /* Payment details */
    .details-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.5rem;margin-bottom:1.75rem;box-shadow:var(--shadow-sm)}
    .card-title{font-size:.875rem;font-weight:700;color:var(--heading);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1.25rem;display:flex;align-items:center;gap:6px}
    .detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1.25rem}
    .detail-item .dl{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:4px}
    .detail-item .dv{font-size:.9rem;font-weight:600;color:var(--heading)}
    .rejection-note{background:#FEF2F2;border:1px solid #FECACA;border-radius:var(--radius-lg);padding:1rem 1.125rem;margin-top:1.25rem}
    .rejection-note .rn-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#991B1B;margin-bottom:4px}
    .rejection-note .rn-text{font-size:.875rem;color:#7F1D1D;line-height:1.6}
    /* Courses */
    .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
    .section-header h2{font-size:1rem;font-weight:700;color:var(--heading)}
    .courses-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.25rem}
    .course-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-xl);padding:1.5rem;text-decoration:none;color:inherit;transition:all var(--transition);display:block;position:relative;box-shadow:var(--shadow-sm)}
    .course-card.unlocked:hover{transform:translateY(-4px);box-shadow:var(--shadow-xl);border-color:var(--brand-accent)}
    .course-card.locked{opacity:.5;cursor:not-allowed}
    .course-icon{font-size:2rem;margin-bottom:.75rem}
    .course-name{font-size:.95rem;font-weight:700;color:var(--heading);margin-bottom:.35rem}
    .course-desc{font-size:.8rem;color:var(--text-muted);line-height:1.5;margin-bottom:.875rem}
    .course-cta{font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:4px}
    .course-cta.open{color:var(--brand-accent)}
    .course-cta.locked{color:var(--text-muted)}
    .lock-badge{position:absolute;top:.875rem;right:.875rem}
    /* Skeleton */
    .skeleton{background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-xl)}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .refresh-pill{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-full);padding:4px 12px;font-size:.75rem;color:var(--text-muted);margin-top:1rem}
    .refresh-pill::before{content:'⟳';color:var(--brand-accent)}
  </style>
</head>
<body>

<nav class="fsh-nav">
  <a href="index.html" class="fsh-logo">
    <div class="fsh-logo-icon">
      <svg viewBox="0 0 24 24" stroke="#fff" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="fsh-logo-text">
      <span class="fsh-logo-name">Freelance Skills Hub</span>
      <span class="fsh-logo-tag">Learn · Build · Earn</span>
    </div>
  </a>
  <div class="fsh-nav-actions">
    <a href="index.html" class="btn btn-ghost btn-sm">Home</a>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="wrap">
  <div class="top-bar">
    <div class="top-bar-left">
      <h1 id="welcome-title">Loading...</h1>
      <p id="welcome-sub"></p>
    </div>
  </div>

  <!-- Payment status card -->
  <div class="status-card none" id="status-card">
    <div>
      <div class="status-icon" id="status-icon">⏳</div>
      <div class="status-title" id="status-title">Loading...</div>
      <div class="status-desc" id="status-desc"></div>
    </div>
    <div id="status-action"></div>
  </div>

  <!-- Payment details -->
  <div class="details-card" id="details-card" style="display:none">
    <div class="card-title">📋 Payment Details</div>
    <div class="detail-grid">
      <div class="detail-item"><div class="dl">Plan</div><div class="dv" id="d-plan">—</div></div>
      <div class="detail-item"><div class="dl">Amount</div><div class="dv" id="d-amount">—</div></div>
      <div class="detail-item"><div class="dl">Reference</div><div class="dv" id="d-ref" style="font-family:var(--font-mono)">—</div></div>
      <div class="detail-item"><div class="dl">Transaction ID</div><div class="dv" id="d-tx" style="font-family:var(--font-mono)">—</div></div>
      <div class="detail-item"><div class="dl">Method</div><div class="dv" id="d-method">—</div></div>
      <div class="detail-item"><div class="dl">Status</div><div class="dv" id="d-status">—</div></div>
      <div class="detail-item"><div class="dl">Submitted</div><div class="dv" id="d-submitted">—</div></div>
      <div class="detail-item"><div class="dl">Verified</div><div class="dv" id="d-verified">—</div></div>
    </div>
    <div class="rejection-note" id="rejection-note" style="display:none">
      <div class="rn-label">Admin Note</div>
      <div class="rn-text" id="rejection-text"></div>
    </div>
  </div>

  <!-- Courses -->
  <div class="section-header">
    <h2 id="courses-title">Your Courses</h2>
    <div class="refresh-pill" id="refresh-pill" style="display:none">
      Auto-refreshing every 30 seconds
    </div>
  </div>
  <div class="courses-grid" id="courses-grid">
    <div class="skeleton" style="height:180px"></div>
    <div class="skeleton" style="height:180px"></div>
    <div class="skeleton" style="height:180px"></div>
    <div class="skeleton" style="height:180px"></div>
  </div>
</div>

<script>
  const COURSES = [
    {icon:'🧱',name:'Web Dev Foundations',desc:'HTML, CSS, JavaScript, Git through real projects.',url:'/foundations/index.html'},
    {icon:'⚡',name:'Full Stack JavaScript',desc:'React, Node.js, Express, and PostgreSQL.',url:'/paths/full-stack-javascript/index.html'},
    {icon:'💎',name:'Full Stack Ruby on Rails',desc:'Ruby and Rails — build production web apps.',url:'/paths/full-stack-ruby-on-rails/index.html'},
    {icon:'🐍',name:'Python for AI',desc:'Python, NumPy, Pandas, Matplotlib for AI.',url:'/paths/python-ai/index.html'},
  ];

  const methodNames = {
    telebirr:'Telebirr', cbe:'CBE', awash:'Awash Bank', bank_transfer:'Bank Transfer'
  };

  window.addEventListener('DOMContentLoaded', () => loadDashboard());

  async function loadDashboard() {
    try {
      const meRes  = await fetch('/api/auth/me', {credentials:'include'});
      const meData = await meRes.json();
      if (!meData.user) { location.href = '/login.html?reason=login_required'; return; }
      if (meData.user.is_admin) { location.href = '/admin.html'; return; }

      const user = meData.user;
      document.getElementById('welcome-title').textContent =
        'Welcome back, ' + user.first_name + '!';
      document.getElementById('welcome-sub').textContent =
        user.email + ' · Freelance Skills Hub';

      const payRes  = await fetch('/api/payment/status', {credentials:'include'});
      const payData = await payRes.json();

      renderStatus(payData);
      renderDetails(payData);
      renderCourses(payData.status === 'verified');

      if (payData.status === 'pending') {
        document.getElementById('refresh-pill').style.display = 'inline-flex';
      }

    } catch (err) {
      location.href = '/login.html';
    }
  }

  function renderStatus(pay) {
    const card   = document.getElementById('status-card');
    const icon   = document.getElementById('status-icon');
    const title  = document.getElementById('status-title');
    const desc   = document.getElementById('status-desc');
    const action = document.getElementById('status-action');

    if (pay.status === 'verified') {
      card.className    = 'status-card verified';
      icon.textContent  = '✅';
      title.textContent = 'Payment Verified — Full Access Active';
      desc.textContent  = 'You have lifetime access to all Freelance Skills Hub courses. Start learning now.';
      action.innerHTML  = `<a href="#courses" class="btn btn-primary btn-sm">Go to Courses →</a>`;

    } else if (pay.status === 'pending' && pay.user_tx_id) {
      card.className    = 'status-card pending';
      icon.textContent  = '⏳';
      title.textContent = 'Payment Under Review';
      desc.textContent  = 'We received your transfer details and are verifying the transaction. This usually takes 1–2 hours during business hours (8am–8pm).';
      action.innerHTML  = '';

    } else if (pay.status === 'pending' && !pay.user_tx_id) {
      card.className    = 'status-card pending';
      icon.textContent  = '📋';
      title.textContent = 'Complete Your Payment';
      desc.textContent  = 'You have a reference code. Submit your transaction details to proceed.';
      action.innerHTML  = `<a href="/submit-payment.html" class="btn btn-primary btn-sm">Submit Details →</a>`;

    } else if (pay.status === 'rejected') {
      card.className    = 'status-card rejected';
      icon.textContent  = '❌';
      title.textContent = 'Payment Not Verified';
      desc.textContent  = pay.notes || 'Your payment could not be verified. Please try again.';
      action.innerHTML  = `<a href="/pay.html" class="btn btn-primary btn-sm">Try Again →</a>`;

    } else {
      card.className    = 'status-card none';
      icon.textContent  = '💳';
      title.textContent = 'No Payment Found';
      desc.textContent  = 'Complete your payment to unlock all 4 learning paths and 200+ lessons.';
      action.innerHTML  = `<a href="/pay.html" class="btn btn-primary btn-sm">Pay Now — 599 ETB</a>`;
    }
  }

  function renderDetails(pay) {
    if (pay.status === 'none') return;
    document.getElementById('details-card').style.display = 'block';

    const badges = {
      verified:`<span class="badge badge-green">✓ Verified</span>`,
      pending: `<span class="badge badge-yellow">⏳ Pending</span>`,
      rejected:`<span class="badge badge-red">✗ Rejected</span>`,
    };

    document.getElementById('d-plan').textContent      = 'Full Access';
    document.getElementById('d-amount').textContent    = pay.amount + ' ' + (pay.currency || 'ETB');
    document.getElementById('d-ref').textContent       = pay.reference_code || '—';
    document.getElementById('d-tx').textContent        = pay.user_tx_id || 'Not submitted yet';
    document.getElementById('d-method').textContent    = pay.payment_method
      ? (methodNames[pay.payment_method] || pay.payment_method) : '—';
    document.getElementById('d-status').innerHTML      = badges[pay.status] || pay.status;
    document.getElementById('d-submitted').textContent = pay.submitted_at
      ? new Date(pay.submitted_at).toLocaleString('en-GB') : '—';
    document.getElementById('d-verified').textContent  = pay.verified_at
      ? new Date(pay.verified_at).toLocaleString('en-GB') : '—';

    if (pay.notes && pay.status === 'rejected') {
      document.getElementById('rejection-note').style.display = 'block';
      document.getElementById('rejection-text').textContent   = pay.notes;
    }
  }

  function renderCourses(unlocked) {
    const grid  = document.getElementById('courses-grid');
    const title = document.getElementById('courses-title');

    title.textContent = unlocked
      ? '✅ Your Courses — All Unlocked'
      : '🔒 Courses — Locked Until Payment Verified';

    grid.innerHTML = COURSES.map(c => {
      if (unlocked) {
        return `
          <a href="${c.url}" class="course-card unlocked">
            <div class="course-icon">${c.icon}</div>
            <div class="course-name">${c.name}</div>
            <div class="course-desc">${c.desc}</div>
            <div class="course-cta open">▶ Start learning →</div>
          </a>`;
      }
      return `
        <div class="course-card locked">
          <div class="lock-badge"><span class="badge badge-gray">🔒 Locked</span></div>
          <div class="course-icon">${c.icon}</div>
          <div class="course-name">${c.name}</div>
          <div class="course-desc">${c.desc}</div>
          <div class="course-cta locked">Complete payment to unlock</div>
        </div>`;
    }).join('');
  }

  // Auto-refresh every 30 seconds
  let refreshCount = 0;
  const interval = setInterval(async () => {
    refreshCount++;
    try {
      const payRes  = await fetch('/api/payment/status', {credentials:'include'});
      const payData = await payRes.json();
      renderStatus(payData);
      renderDetails(payData);
      renderCourses(payData.status === 'verified');

      if (payData.status === 'verified') {
        clearInterval(interval);
        document.getElementById('refresh-pill').style.display = 'none';
        // Flash notification
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#166534;color:#fff;padding:12px 24px;border-radius:999px;font-weight:700;font-size:.875rem;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:999;animation:fadeIn .4s ease';
        banner.textContent = '🎉 Payment verified! Your courses are now unlocked.';
        document.body.appendChild(banner);
        setTimeout(() => banner.remove(), 5000);
      }

      if (refreshCount > 60) clearInterval(interval);
    } catch (e) {}
  }, 30000);

  async function logout() {
    await fetch('/api/auth/logout', {method:'POST', credentials:'include'});
    location.href = '/login.html';
  }
</script>
</body>
</html>
