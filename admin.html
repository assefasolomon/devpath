<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | DevPath</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: var(--bg); }
    .admin-wrap { max-width: 1100px; margin: 0 auto; padding: 2rem; }

    .admin-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 2rem;
      padding-bottom: 1rem; border-bottom: 1px solid var(--border);
    }
    .admin-header h1 { font-size: 1.5rem; color: var(--heading); }
    .admin-user { font-size: .85rem; color: var(--text-muted); }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      text-align: center;
    }
    .stat-card .num {
      font-size: 2rem; font-weight: 700;
      color: var(--accent);
    }
    .stat-card .label {
      font-size: .78rem; color: var(--text-muted);
      font-family: var(--font-mono);
      text-transform: uppercase; margin-top: 4px;
    }
    .stat-card.green .num { color: var(--green); }
    .stat-card.red   .num { color: #ef4444; }
    .stat-card.blue  .num { color: var(--primary-light); }

    /* Tabs */
    .tabs {
      display: flex; gap: .5rem;
      margin-bottom: 1.5rem; flex-wrap: wrap;
    }
    .tab {
      padding: .5rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-muted);
      font-size: .875rem; cursor: pointer;
      font-family: var(--font-ui);
      transition: all var(--transition);
    }
    .tab:hover { border-color: var(--primary); color: var(--text); }
    .tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--surface-2);
      padding: .75rem 1rem;
      text-align: left;
      font-size: .75rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: .875rem 1rem;
      font-size: .875rem;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.02); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 700;
      font-family: var(--font-mono);
      text-transform: uppercase;
    }
    .badge-pending  { background: rgba(251,191,36,.15); color: #fbbf24; }
    .badge-verified { background: rgba(16,185,129,.15); color: #10b981; }
    .badge-rejected { background: rgba(239,68,68,.15);  color: #ef4444; }
    .badge-none     { background: var(--surface-2); color: var(--text-muted); }

    /* Action buttons */
    .action-btn {
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-family: var(--font-ui);
      transition: all var(--transition);
      margin-right: 4px;
    }
    .btn-verify { background: var(--green); color: #000; }
    .btn-verify:hover { opacity: .85; }
    .btn-reject { background: #ef4444; color: #fff; }
    .btn-reject:hover { opacity: .85; }
    .btn-revoke { background: #f59e0b; color: #000; }
    .btn-revoke:hover { opacity: .85; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      display: none; align-items: center;
      justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem; max-width: 480px;
      width: 90%; position: relative;
    }
    .modal h3 { color: var(--heading); margin-bottom: 1rem; }
    .modal p  { color: var(--text-muted); font-size: .9rem; margin-bottom: 1rem; }
    .modal textarea {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px; color: var(--heading);
      font-family: var(--font-ui); font-size: .875rem;
      resize: vertical; min-height: 80px;
      outline: none; margin-bottom: 1rem;
    }
    .modal textarea:focus { border-color: var(--primary); }
    .modal-actions { display: flex; gap: .75rem; justify-content: flex-end; }
    .btn-cancel {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text); padding: .5rem 1.25rem;
      border-radius: var(--radius-sm); cursor: pointer;
      font-family: var(--font-ui);
    }
    .btn-confirm {
      padding: .5rem 1.25rem;
      border-radius: var(--radius-sm);
      border: none; cursor: pointer;
      font-weight: 700; font-family: var(--font-ui);
    }
    .btn-confirm-green { background: var(--green); color: #000; }
    .btn-confirm-red   { background: #ef4444; color: #fff; }

    .empty-state {
      text-align: center; padding: 3rem;
      color: var(--text-muted); font-size: .9rem;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: .4rem 1rem;
      border-radius: var(--radius-sm);
      cursor: pointer; font-family: var(--font-ui);
      font-size: .85rem;
      transition: all var(--transition);
    }
    .logout-btn:hover { border-color: #ef4444; color: #ef4444; }

    .refresh-btn {
      background: var(--primary);
      border: none; color: #fff;
      padding: .4rem 1rem;
      border-radius: var(--radius-sm);
      cursor: pointer; font-family: var(--font-ui);
      font-size: .85rem; margin-left: .5rem;
    }

    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      font-size: .9rem; color: var(--heading);
      box-shadow: var(--shadow);
      transform: translateY(100px);
      opacity: 0;
      transition: all .3s ease;
      z-index: 200;
    }
    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }
    .toast.success { border-left: 4px solid var(--green); }
    .toast.error   { border-left: 4px solid #ef4444; }
  </style>
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.8"/>
      <path d="M8 14 L14 7 L20 14 L14 21 Z" fill="currentColor"/>
    </svg>
    DevPath
  </a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="admin.html" class="active">Admin</a></li>
  </ul>
</nav>

<div class="admin-wrap">

  <div class="admin-header">
    <div>
      <h1>🛡️ Admin Panel</h1>
      <div class="admin-user" id="admin-user-label">Loading...</div>
    </div>
    <div>
      <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="num" id="stat-users">—</div>
      <div class="label">Total Users</div>
    </div>
    <div class="stat-card">
      <div class="num" id="stat-pending">—</div>
      <div class="label">Pending</div>
    </div>
    <div class="stat-card green">
      <div class="num" id="stat-verified">—</div>
      <div class="label">Verified</div>
    </div>
    <div class="stat-card red">
      <div class="num" id="stat-rejected">—</div>
      <div class="label">Rejected</div>
    </div>
    <div class="stat-card blue">
      <div class="num" id="stat-revenue">—</div>
      <div class="label">Revenue (ETB)</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('pending')">⏳ Pending</button>
    <button class="tab" onclick="switchTab('verified')">✅ Verified</button>
    <button class="tab" onclick="switchTab('rejected')">❌ Rejected</button>
    <button class="tab" onclick="switchTab('users')">👥 Users</button>
  </div>

  <!-- PAYMENTS TABLE -->
  <div id="payments-section">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Reference</th>
            <th>User</th>
            <th>Plan</th>
            <th>Amount</th>
            <th>Method</th>
            <th>TX ID</th>
            <th>Status</th>
            <th>Submitted</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="payments-body">
          <tr><td colspan="9" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- USERS TABLE -->
  <div id="users-section" style="display:none">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Payment</th>
            <th>Plan</th>
            <th>Verified At</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="7" class="empty-state">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /.admin-wrap -->

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm Action</h3>
    <p  id="modal-desc">Are you sure?</p>
    <textarea id="modal-notes" placeholder="Notes (optional)..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  let currentTab    = 'pending';
  let pendingAction = null;

  // ── on load ──────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', async () => {
    await checkAdmin();
    await loadAll();
    setInterval(loadAll, 30000); // auto-refresh every 30s
  });

  async function checkAdmin() {
    const res  = await fetch('/api/auth/me', { credentials: 'include' });
    const data = await res.json();
    if (!res.ok || !data.user?.is_admin) {
      window.location.href = '/login.html?reason=admin_required';
      return;
    }
    document.getElementById('admin-user-label').textContent =
      `Logged in as ${data.user.first_name} ${data.user.last_name} (${data.user.email})`;
  }

  async function loadAll() {
    await loadStats();
    if (currentTab === 'users') {
      await loadUsers();
    } else {
      await loadPayments(currentTab);
    }
  }

  // ── stats ─────────────────────────────────────────────
  async function loadStats() {
    const res  = await fetch('/api/admin/stats', { credentials: 'include' });
    const data = await res.json();
    document.getElementById('stat-users').textContent    = data.total_users   ?? '—';
    document.getElementById('stat-pending').textContent  = data.pending        ?? '—';
    document.getElementById('stat-verified').textContent = data.verified       ?? '—';
    document.getElementById('stat-rejected').textContent = data.rejected       ?? '—';
    document.getElementById('stat-revenue').textContent  =
      data.total_revenue ? data.total_revenue.toLocaleString() + ' ETB' : '0 ETB';
  }

  // ── tabs ──────────────────────────────────────────────
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', ['pending','verified','rejected','users'][i] === tab);
    });
    document.getElementById('payments-section').style.display = tab === 'users' ? 'none' : 'block';
    document.getElementById('users-section').style.display    = tab === 'users' ? 'block' : 'none';
    if (tab === 'users') {
      loadUsers();
    } else {
      loadPayments(tab);
    }
  }

  // ── payments ──────────────────────────────────────────
  async function loadPayments(status) {
    const res  = await fetch(`/api/admin/payments?status=${status}`, { credentials: 'include' });
    const data = await res.json();
    const tbody = document.getElementById('payments-body');

    if (!data.payments || data.payments.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9" class="empty-state">No ${status} payments found.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.payments.map(p => `
      <tr>
        <td><code style="color:var(--secondary);font-size:.8rem">${p.reference_code}</code></td>
        <td>
          <div style="font-weight:600;color:var(--heading)">${p.first_name} ${p.last_name}</div>
          <div style="font-size:.78rem;color:var(--text-muted)">${p.user_email}</div>
        </td>
        <td style="text-transform:capitalize">${p.plan}</td>
        <td>${parseFloat(p.amount).toLocaleString()} ${p.currency}</td>
        <td style="text-transform:capitalize">${p.payment_method || '—'}</td>
        <td><code style="font-size:.78rem">${p.user_tx_id || '—'}</code></td>
        <td><span class="badge badge-${p.status}">${p.status}</span></td>
        <td style="font-size:.78rem;color:var(--text-muted)">${formatDate(p.submitted_at)}</td>
        <td>
          ${p.status === 'pending' ? `
            <button class="action-btn btn-verify" onclick="openModal('verify', ${p.id}, '${p.first_name} ${p.last_name}')">✓ Verify</button>
            <button class="action-btn btn-reject" onclick="openModal('reject', ${p.id}, '${p.first_name} ${p.last_name}')">✗ Reject</button>
          ` : ''}
          ${p.status === 'verified' ? `
            <button class="action-btn btn-revoke" onclick="openModal('revoke-payment', ${p.id}, '${p.first_name} ${p.last_name}')">Revoke</button>
          ` : ''}
          ${p.status === 'rejected' ? '<span style="color:var(--text-muted);font-size:.8rem">No actions</span>' : ''}
        </td>
      </tr>
    `).join('');
  }

  // ── users ─────────────────────────────────────────────
  async function loadUsers() {
    const res  = await fetch('/api/admin/users', { credentials: 'include' });
    const data = await res.json();
    const tbody = document.getElementById('users-body');

    if (!data.users || data.users.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No users found.</td></tr>`;
      return;
    }

    tbody.innerHTML = data.users.map(u => `
      <tr>
        <td style="font-weight:600;color:var(--heading)">${u.first_name} ${u.last_name}</td>
        <td style="font-size:.85rem">${u.email}</td>
        <td>
          <span class="badge badge-${u.payment_status || 'none'}">
            ${u.payment_status || 'none'}
          </span>
        </td>
        <td style="text-transform:capitalize">${u.payment_plan || '—'}</td>
        <td style="font-size:.78rem;color:var(--text-muted)">${u.verified_at ? formatDate(u.verified_at) : '—'}</td>
        <td style="font-size:.78rem;color:var(--text-muted)">${formatDate(u.created_at)}</td>
        <td>
          ${u.payment_status === 'verified' ? `
            <button class="action-btn btn-revoke" onclick="openModal('revoke', ${u.id}, '${u.first_name} ${u.last_name}')">Revoke Access</button>
          ` : '—'}
        </td>
      </tr>
    `).join('');
  }

  // ── modal ─────────────────────────────────────────────
  function openModal(action, id, name) {
    pendingAction = { action, id, name };
    const modal   = document.getElementById('modal');
    const title   = document.getElementById('modal-title');
    const desc    = document.getElementById('modal-desc');
    const confirm = document.getElementById('modal-confirm');
    const notes   = document.getElementById('modal-notes');

    notes.value = '';

    if (action === 'verify') {
      title.textContent   = '✅ Verify Payment';
      desc.textContent    = `Verify payment for ${name}? This will unlock their course access immediately.`;
      confirm.textContent = 'Yes, Verify';
      confirm.className   = 'btn-confirm btn-confirm-green';
    } else if (action === 'reject') {
      title.textContent   = '❌ Reject Payment';
      desc.textContent    = `Reject payment from ${name}? They will not get access.`;
      confirm.textContent = 'Yes, Reject';
      confirm.className   = 'btn-confirm btn-confirm-red';
    } else if (action === 'revoke' || action === 'revoke-payment') {
      title.textContent   = '⚠️ Revoke Access';
      desc.textContent    = `Revoke course access for ${name}?`;
      confirm.textContent = 'Yes, Revoke';
      confirm.className   = 'btn-confirm btn-confirm-red';
    }

    modal.classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    pendingAction = null;
  }

  async function confirmAction() {
    if (!pendingAction) return;
    const { action, id } = pendingAction;
    const notes = document.getElementById('modal-notes').value;
    closeModal();

    let url, method = 'POST';

    if (action === 'verify') {
      url = `/api/admin/verify/${id}`;
    } else if (action === 'reject') {
      url = `/api/admin/reject/${id}`;
    } else if (action === 'revoke') {
      url = `/api/admin/revoke/${id}`;
    } else if (action === 'revoke-payment') {
      url = `/api/admin/reject/${id}`;
    }

    try {
      const res  = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ notes })
      });
      const data = await res.json();

      if (res.ok) {
        showToast(data.message, 'success');
        await loadAll();
      } else {
        showToast(data.error || 'Action failed.', 'error');
      }
    } catch (err) {
      showToast('Network error. Please try again.', 'error');
    }
  }

  // ── logout ────────────────────────────────────────────
  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' });
    window.location.href = '/login.html';
  }

  // ── toast ─────────────────────────────────────────────
  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className   = `toast ${type} show`;
    setTimeout(() => { toast.className = 'toast'; }, 4000);
  }

  // ── helpers ───────────────────────────────────────────
  function formatDate(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  // Close modal when clicking outside
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
