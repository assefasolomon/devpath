<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | DevPath</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body{background:var(--bg)}
    .wrap{max-width:1100px;margin:0 auto;padding:2rem}
    .admin-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:1rem}
    .admin-top h1{font-size:1.4rem;font-weight:700;color:var(--heading)}
    .admin-user{font-size:.82rem;color:var(--text-muted);margin-top:3px}
    .top-actions{display:flex;gap:.5rem;align-items:center}
    .refresh-btn{background:var(--primary);border:none;color:#fff;padding:.4rem 1rem;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-ui);font-size:.85rem;transition:all var(--transition)}
    .refresh-btn:hover{background:var(--primary-hover)}
    .logout-btn{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:.4rem 1rem;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-ui);font-size:.85rem;transition:all var(--transition)}
    .logout-btn:hover{border-color:#ef4444;color:#ef4444}
    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2rem}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;text-align:center}
    .stat-num{font-size:2rem;font-weight:700;color:var(--accent)}
    .stat-num.green{color:var(--green)}
    .stat-num.red{color:#ef4444}
    .stat-num.blue{color:var(--primary-light)}
    .stat-label{font-family:var(--font-mono);font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:4px}
    /* Search + filter */
    .filter-bar{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center}
    .filter-bar input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;color:var(--heading);font-size:.875rem;font-family:var(--font-ui);outline:none;flex:1;min-width:200px;transition:border-color var(--transition)}
    .filter-bar input:focus{border-color:var(--primary)}
    .filter-bar input::placeholder{color:var(--text-muted);opacity:.5}
    /* Tabs */
    .tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
    .tab{padding:.45rem 1.1rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-muted);font-size:.85rem;cursor:pointer;font-family:var(--font-ui);transition:all var(--transition)}
    .tab:hover{border-color:var(--primary);color:var(--text)}
    .tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
    /* Table */
    .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:700px}
    th{background:var(--surface-2);padding:.7rem 1rem;text-align:left;font-size:.72rem;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);border-bottom:1px solid var(--border);white-space:nowrap}
    td{padding:.8rem 1rem;font-size:.85rem;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.7rem;font-weight:700;font-family:var(--font-mono);text-transform:uppercase}
    .badge-pending{background:rgba(251,191,36,.15);color:#fbbf24}
    .badge-verified{background:rgba(16,185,129,.15);color:#10b981}
    .badge-rejected{background:rgba(239,68,68,.15);color:#ef4444}
    .action-btn{padding:4px 12px;border-radius:var(--radius-sm);font-size:.78rem;font-weight:700;cursor:pointer;border:none;font-family:var(--font-ui);transition:all var(--transition);margin-right:4px;white-space:nowrap}
    .btn-verify{background:var(--green);color:#000}
    .btn-verify:hover{opacity:.85}
    .btn-reject{background:#ef4444;color:#fff}
    .btn-reject:hover{opacity:.85}
    .btn-revoke{background:#f59e0b;color:#000}
    .btn-revoke:hover{opacity:.85}
    .empty{text-align:center;padding:3rem;color:var(--text-muted);font-size:.9rem}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2rem;max-width:480px;width:100%}
    .modal h3{color:var(--heading);margin-bottom:.75rem;font-size:1.1rem}
    .modal p{color:var(--text-muted);font-size:.875rem;margin-bottom:1rem;line-height:1.6}
    .modal textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--heading);font-family:var(--font-ui);font-size:.875rem;resize:vertical;min-height:80px;outline:none;margin-bottom:1rem;box-sizing:border-box;transition:border-color var(--transition)}
    .modal textarea:focus{border-color:var(--primary)}
    .modal-req{font-size:.78rem;color:#ef4444;margin-bottom:.75rem;display:none}
    .modal-req.show{display:block}
    .modal-actions{display:flex;gap:.75rem;justify-content:flex-end}
    .btn-cancel{background:var(--surface-2);border:1px solid var(--border);color:var(--text);padding:.5rem 1.25rem;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-ui)}
    .btn-confirm{padding:.5rem 1.25rem;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:700;font-family:var(--font-ui)}
    .btn-confirm.green{background:var(--green);color:#000}
    .btn-confirm.red{background:#ef4444;color:#fff}
    /* Toast */
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.5rem;font-size:.875rem;color:var(--heading);box-shadow:var(--shadow);transform:translateY(100px);opacity:0;transition:all .3s ease;z-index:200;max-width:360px}
    .toast.show{transform:translateY(0);opacity:1}
    .toast.success{border-left:4px solid var(--green)}
    .toast.error{border-left:4px solid #ef4444}
    .ref-code{font-family:var(--font-mono);font-size:.82rem;color:var(--secondary)}
    .user-name-cell{font-weight:600;color:var(--heading)}
    .user-email-cell{font-size:.78rem;color:var(--text-muted);margin-top:1px}
  </style>
</head>
<body>
<nav class="site-nav">
  <a href="index.html" class="nav-logo">
    <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.8"/><path d="M8 14 L14 7 L20 14 L14 21 Z" fill="currentColor"/></svg>
    DevPath
  </a>
</nav>

<div class="wrap">
  <div class="admin-top">
    <div>
      <h1>🛡️ Admin Panel</h1>
      <div class="admin-user" id="admin-label">Loading...</div>
    </div>
    <div class="top-actions">
      <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num blue" id="s-users">—</div><div class="stat-label">Users</div></div>
    <div class="stat-card"><div class="stat-num" id="s-pending">—</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-num green" id="s-verified">—</div><div class="stat-label">Verified</div></div>
    <div class="stat-card"><div class="stat-num red" id="s-rejected">—</div><div class="stat-label">Rejected</div></div>
    <div class="stat-card"><div class="stat-num green" id="s-revenue">—</div><div class="stat-label">Revenue (ETB)</div></div>
  </div>

  <!-- Tabs + search -->
  <div class="tabs">
    <button class="tab active" id="tab-pending"  onclick="switchTab('pending')">⏳ Pending</button>
    <button class="tab"        id="tab-verified" onclick="switchTab('verified')">✅ Verified</button>
    <button class="tab"        id="tab-rejected" onclick="switchTab('rejected')">❌ Rejected</button>
    <button class="tab"        id="tab-users"    onclick="switchTab('users')">👥 Users</button>
  </div>

  <div class="filter-bar" id="search-bar">
    <input type="text" id="search-input" placeholder="Search by name, email, reference, or transaction ID..."
           oninput="doSearch()">
  </div>

  <!-- Payments table -->
  <div id="payments-section">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>User</th>
            <th>Reference</th>
            <th>TX ID</th>
            <th>Amount</th>
            <th>Method</th>
            <th>Status</th>
            <th>Submitted</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="payments-body">
          <tr><td colspan="8" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Users table -->
  <div id="users-section" style="display:none">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Payment Status</th>
            <th>Reference</th>
            <th>Amount</th>
            <th>Joined</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-body">
          <tr><td colspan="7" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Confirm</h3>
    <p  id="modal-desc"></p>
    <div class="modal-req" id="modal-req">This field is required.</div>
    <textarea id="modal-notes" placeholder="Notes..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" id="modal-confirm" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let currentTab    = 'pending';
  let pendingAction = null;
  let searchTimer   = null;

  window.addEventListener('DOMContentLoaded', async () => {
    // Auth check
    const res  = await fetch('/api/auth/me', {credentials:'include'});
    const data = await res.json();
    if (!res.ok || !data.user?.is_admin) {
      location.href = '/login.html?reason=admin_required';
      return;
    }
    document.getElementById('admin-label').textContent =
      `${data.user.first_name} ${data.user.last_name} · ${data.user.email}`;

    await loadAll();
    setInterval(loadAll, 30000); // auto-refresh every 30s
  });

  async function loadAll() {
    await loadStats();
    if (currentTab === 'users') await loadUsers();
    else await loadPayments(currentTab);
  }

  async function loadStats() {
    try {
      const res  = await fetch('/api/admin/stats', {credentials:'include'});
      const data = await res.json();
      document.getElementById('s-users').textContent   = data.total_users ?? '—';
      document.getElementById('s-pending').textContent = data.pending ?? '—';
      document.getElementById('s-verified').textContent= data.verified ?? '—';
      document.getElementById('s-rejected').textContent= data.rejected ?? '—';
      document.getElementById('s-revenue').textContent =
        data.total_revenue ? data.total_revenue.toLocaleString() + ' ETB' : '0 ETB';
    } catch (e) {}
  }

  function switchTab(tab) {
    currentTab = tab;
    ['pending','verified','rejected','users'].forEach(t => {
      document.getElementById('tab-'+t).classList.toggle('active', t === tab);
    });
    document.getElementById('payments-section').style.display = tab === 'users' ? 'none' : 'block';
    document.getElementById('users-section').style.display    = tab === 'users' ? 'block' : 'none';
    document.getElementById('search-input').value = '';
    if (tab === 'users') loadUsers();
    else loadPayments(tab);
  }

  function doSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      if (currentTab === 'users') loadUsers();
      else loadPayments(currentTab);
    }, 300);
  }

  async function loadPayments(status) {
    const search = document.getElementById('search-input').value.trim();
    const params = new URLSearchParams({status});
    if (search) params.set('search', search);

    try {
      const res  = await fetch(`/api/admin/payments?${params}`, {credentials:'include'});
      const data = await res.json();
      const tbody = document.getElementById('payments-body');

      if (!data.payments?.length) {
        tbody.innerHTML = `<tr><td colspan="8" class="empty">No ${status} payments found.</td></tr>`;
        return;
      }

      const methodNames = {telebirr:'Telebirr',cbe:'CBE',awash:'Awash',bank_transfer:'Bank'};

      tbody.innerHTML = data.payments.map(p => `
        <tr>
          <td>
            <div class="user-name-cell">${p.first_name} ${p.last_name}</div>
            <div class="user-email-cell">${p.user_email}</div>
          </td>
          <td><span class="ref-code">${p.reference_code}</span></td>
          <td style="font-family:var(--font-mono);font-size:.78rem">${p.user_tx_id || '—'}</td>
          <td>${parseFloat(p.amount).toLocaleString()} ${p.currency}</td>
          <td style="text-transform:capitalize">${methodNames[p.payment_method] || p.payment_method || '—'}</td>
          <td><span class="badge badge-${p.status}">${p.status}</span></td>
          <td style="font-size:.78rem;color:var(--text-muted);white-space:nowrap">
            ${p.submitted_at ? new Date(p.submitted_at).toLocaleString('en-GB') : '—'}
          </td>
          <td>
            ${p.status === 'pending' && p.user_tx_id ? `
              <button class="action-btn btn-verify" onclick="openModal('verify',${p.id},'${p.first_name} ${p.last_name}',false)">✓ Verify</button>
              <button class="action-btn btn-reject" onclick="openModal('reject',${p.id},'${p.first_name} ${p.last_name}',true)">✗ Reject</button>
            ` : ''}
            ${p.status === 'pending' && !p.user_tx_id ? `<span style="color:var(--text-muted);font-size:.78rem">Awaiting TX details</span>` : ''}
            ${p.status === 'verified' ? `<button class="action-btn btn-revoke" onclick="openModal('revoke',${p.id},'${p.first_name} ${p.last_name}',true)">Revoke</button>` : ''}
            ${p.status === 'rejected' ? `<span style="color:var(--text-muted);font-size:.78rem">—</span>` : ''}
          </td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('payments-body').innerHTML =
        `<tr><td colspan="8" class="empty">Failed to load payments.</td></tr>`;
    }
  }

  async function loadUsers() {
    const search = document.getElementById('search-input').value.trim();
    try {
      const res  = await fetch('/api/admin/users', {credentials:'include'});
      const data = await res.json();
      const tbody = document.getElementById('users-body');

      let users = data.users || [];
      if (search) {
        const q = search.toLowerCase();
        users = users.filter(u =>
          u.first_name.toLowerCase().includes(q) ||
          u.last_name.toLowerCase().includes(q) ||
          u.email.toLowerCase().includes(q) ||
          (u.reference_code || '').toLowerCase().includes(q)
        );
      }

      if (!users.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty">No users found.</td></tr>`;
        return;
      }

      tbody.innerHTML = users.map(u => `
        <tr>
          <td class="user-name-cell">${u.first_name} ${u.last_name}</td>
          <td style="font-size:.85rem">${u.email}</td>
          <td><span class="badge badge-${u.payment_status || 'none'}">${u.payment_status || 'none'}</span></td>
          <td><span class="ref-code">${u.reference_code || '—'}</span></td>
          <td>${u.amount ? parseFloat(u.amount).toLocaleString() + ' ETB' : '—'}</td>
          <td style="font-size:.78rem;color:var(--text-muted)">${new Date(u.created_at).toLocaleDateString('en-GB')}</td>
          <td>
            ${u.payment_status === 'verified'
              ? `<button class="action-btn btn-revoke" onclick="openModal('revoke-user',${u.id},'${u.first_name} ${u.last_name}',true)">Revoke Access</button>`
              : '—'
            }
          </td>
        </tr>
      `).join('');
    } catch (e) {
      document.getElementById('users-body').innerHTML =
        `<tr><td colspan="7" class="empty">Failed to load users.</td></tr>`;
    }
  }

  // Modal
  function openModal(action, id, name, requireNotes) {
    pendingAction = { action, id, name, requireNotes };
    const modal   = document.getElementById('modal');
    const title   = document.getElementById('modal-title');
    const desc    = document.getElementById('modal-desc');
    const confirm = document.getElementById('modal-confirm');
    const notes   = document.getElementById('modal-notes');
    const req     = document.getElementById('modal-req');

    notes.value = '';
    req.classList.remove('show');
    notes.placeholder = requireNotes ? 'Required...' : 'Optional notes...';

    if (action === 'verify') {
      title.textContent   = '✅ Verify Payment';
      desc.textContent    = `Verify payment for ${name}? This will unlock their course access immediately.`;
      confirm.textContent = 'Verify Payment';
      confirm.className   = 'btn-confirm green';
    } else if (action === 'reject') {
      title.textContent   = '❌ Reject Payment';
      desc.textContent    = `Reject payment from ${name}? Please provide a reason so the user knows what to do.`;
      confirm.textContent = 'Reject Payment';
      confirm.className   = 'btn-confirm red';
    } else {
      title.textContent   = '⚠️ Revoke Access';
      desc.textContent    = `Revoke access for ${name}? They will lose course access immediately.`;
      confirm.textContent = 'Revoke Access';
      confirm.className   = 'btn-confirm red';
    }

    modal.classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    pendingAction = null;
  }

  async function confirmAction() {
    if (!pendingAction) return;
    const { action, id, requireNotes } = pendingAction;
    const notes = document.getElementById('modal-notes').value.trim();
    const req   = document.getElementById('modal-req');

    if (requireNotes && !notes) {
      req.classList.add('show');
      return;
    }

    let url;
    if (action === 'verify')     url = `/api/admin/verify/${id}`;
    if (action === 'reject')     url = `/api/admin/reject/${id}`;
    if (action === 'revoke')     url = `/api/admin/reject/${id}`;
    if (action === 'revoke-user') url = `/api/admin/revoke/${id}`;

    closeModal();

    try {
      const res  = await fetch(url, {
        method:'POST', credentials:'include',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({notes})
      });
      const data = await res.json();

      if (res.ok) {
        showToast(data.message || 'Action completed.', 'success');
        await loadAll();
      } else {
        showToast(data.error || 'Action failed.', 'error');
      }
    } catch (e) {
      showToast('Network error. Please try again.', 'error');
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = `toast ${type} show`;
    setTimeout(() => { t.className = 'toast'; }, 4000);
  }

  async function logout() {
    await fetch('/api/auth/logout', {method:'POST', credentials:'include'});
    location.href = '/login.html';
  }

  // Close modal on outside click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
